<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Darkverse AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* PARTICLES */

.particles{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%,#00ffe144 2px,transparent 2px),
radial-gradient(circle at 80% 40%,#00ffe144 2px,transparent 2px),
radial-gradient(circle at 50% 80%,#00ffe144 2px,transparent 2px),
radial-gradient(circle at 30% 60%,#00ffe144 2px,transparent 2px);
background-size:200px 200px;
animation:move 20s linear infinite;
z-index:-1;
}

@keyframes move{

from{
transform:translateY(0px);
}

to{
transform:translateY(-200px);
}

}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#111;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:28px;
font-weight:bold;
color:#00ffe1;
text-shadow:0 0 20px #00ffe1;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav ul li{
cursor:pointer;
transition:0.3s;
}

nav ul li:hover{
color:#00ffe1;
}

/* HERO */

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero h1{
font-size:75px;
color:#00ffe1;
text-shadow:0 0 30px #00ffe1;
animation:glow 2s infinite alternate;
}

@keyframes glow{

from{
text-shadow:0 0 10px #00ffe1;
}

to{
text-shadow:0 0 40px #00ffe1;
}

}

.hero p{
margin-top:20px;
font-size:22px;
color:#aaa;
}

.hero button{
margin-top:30px;
padding:15px 40px;
border:none;
border-radius:40px;
background:#00ffe1;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #00ffe1;
}

/* CHAT */

.chat-section{
padding:80px 20px;
text-align:center;
}

.chat-box{
max-width:600px;
margin:auto;
}

.chat-box input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#111;
color:white;
font-size:18px;
outline:none;
}

.buttons{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

.buttons button{
padding:15px 35px;
border:none;
border-radius:40px;
background:#00ffe1;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #00ffe1;
}

#aiResponse{
margin-top:30px;
font-size:22px;
color:#00ffe1;
min-height:50px;
}

/* FOOTER */

footer{
background:#111;
padding:30px;
text-align:center;
color:#aaa;
margin-top:50px;
}

/* MOBILE */

@media(max-width:700px){

.hero h1{
font-size:50px;
}

.hero p{
font-size:18px;
}

nav ul{
display:none;
}

}

</style>

</head>

<body>

<div class="particles"></div>

<nav>

<div class="logo">
🚀 Darkverse AI
</div>

<ul>
<li>Home</li>
<li>About</li>
<li>Services</li>
</ul>

</nav>

<div class="hero">

<h1>Darkverse AI</h1>

<p>
Future of Artificial Intelligence Starts Here
</p>

<button onclick="speak('Welcome to Darkverse AI')">
Enter Future
</button>

</div>

<section class="chat-section">

<h1 style="font-size:50px;">
🤖 AI Chat
</h1>

<div class="chat-box">

<input
type="text"
id="userInput"
placeholder="Ask Darkverse AI..."
>

<div class="buttons">

<button onclick="replyAI()">
Send
</button>

<button onclick="startVoice()">
🎤 Speak
</button>

</div>

<div id="aiResponse"></div>

</div>

</section>

<footer>
© 2026 Darkverse AI — All Rights Reserved
</footer>

<script>

function speak(text){

const speech =
new SpeechSynthesisUtterance(text);

speech.lang = "en-US";

window.speechSynthesis.speak(speech);

}

function getReply(input){

if(input.includes("hello")){

return "🤖 Hello! Welcome to Darkverse AI 🚀";

}

else if(input.includes("how are you")){

return "🤖 I am operating perfectly 🚀";

}

else if(input.includes("your name")){

return "🤖 I am Darkverse AI";

}

else if(input.includes("who made you")){

return "🤖 I was created by Samir 🚀";

}

else if(input.includes("ai")){

return "🤖 Artificial Intelligence is the future.";

}

else{

return "🤖 Darkverse AI says: " + input;

}

}

function replyAI(){

const input =
document.getElementById("userInput")
.value.toLowerCase();

const response =
document.getElementById("aiResponse");

response.innerHTML =
"⏳ Thinking...";

setTimeout(() => {

const reply =
getReply(input);

response.innerHTML = reply;

speak(reply);

},1500);

}

function startVoice(){

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

alert("Voice recognition not supported");

return;

}

const recognition =
new SpeechRecognition();

recognition.lang = "en-US";

recognition.start();

recognition.onresult = function(event){

const voiceText =
event.results[0][0].transcript;

document.getElementById("userInput").value =
voiceText;

replyAI();

};

}

</script>

</body>
</html>
