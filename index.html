<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Darkverse AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:black;
color:white;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(#00ffe7 1px, transparent 1px);
background-size:40px 40px;
opacity:0.2;
z-index:-1;
}

.container{
width:95%;
max-width:500px;
height:95vh;
background:#0a0a0a;
border:2px solid #00ffe7;
border-radius:30px;
padding:20px;
display:flex;
flex-direction:column;
box-shadow:0 0 30px #00ffe7;
}

.logo{
text-align:center;
font-size:42px;
font-weight:bold;
color:#00ffe7;
margin-bottom:20px;
text-shadow:0 0 20px #00ffe7;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:15px;
scroll-behavior:smooth;
}

.user,
.bot{
max-width:80%;
padding:15px;
border-radius:20px;
font-size:20px;
word-wrap:break-word;
animation:fadeIn 0.3s ease;
}

.user{
align-self:flex-end;
background:#00ffe7;
color:black;
border-bottom-right-radius:5px;
}

.bot{
align-self:flex-start;
background:#1a1a1a;
color:#00ffe7;
border-bottom-left-radius:5px;
box-shadow:0 0 15px rgba(0,255,231,0.3);
}

.input-area{
margin-top:15px;
display:flex;
flex-direction:column;
gap:15px;
}

input{
padding:18px;
border:none;
outline:none;
border-radius:18px;
background:black;
color:white;
font-size:20px;
box-shadow:0 0 15px rgba(0,255,231,0.3);
}

button{
padding:18px;
border:none;
border-radius:50px;
font-size:22px;
background:#00ffe7;
color:black;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 25px #00ffe7;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<div class="logo">🚀 Darkverse AI</div>

<div class="chat-box" id="chatBox">

<div class="bot">
🤖 Hello! Welcome to Darkverse AI 🚀
</div>

</div>

<div class="input-area">

<input
type="text"
id="userInput"
placeholder="Ask Darkverse AI..."
>

<button onclick="sendMessage()">
Send
</button>

<button onclick="startVoice()">
🎤 Speak
</button>

</div>

</div>

<script>

const input = document.getElementById("userInput");
const chatBox = document.getElementById("chatBox");

function addMessage(text, sender){

const msg = document.createElement("div");

msg.classList.add(sender);

chatBox.appendChild(msg);

if(sender === "bot"){
typeEffect(msg, "🤖 " + text);
}else{
msg.innerText = text;
}

chatBox.scrollTop = chatBox.scrollHeight;
}

function typeEffect(element, text){

let i = 0;

function typing(){

if(i < text.length){

element.innerHTML += text.charAt(i);

i++;

setTimeout(typing, 20);

}

}

typing();

}

async function sendMessage(){

const message = input.value.trim();

if(!message) return;

addMessage(message, "user");

input.value = "";

try{

const response = await fetch("/api/chat", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:message
})

});

const data = await response.json();

addMessage(data.reply || "No response", "bot");

}catch(error){

addMessage("Server Error ❌", "bot");

}

}

function startVoice(){

const recognition =
new(window.SpeechRecognition ||
window.webkitSpeechRecognition)();

recognition.lang = "en-US";

recognition.onresult = function(event){

const voiceText =
event.results[0][0].transcript;

input.value = voiceText;

sendMessage();

};

recognition.start();

}

</script>

</body>
</html>
