<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darkverse AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* Animated background */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(#00ffe155 1px, transparent 1px);
background-size:40px 40px;
animation:bg 12s linear infinite;
z-index:-1;
}

@keyframes bg{
from{
transform:translateY(0);
}
to{
transform:translateY(-40px);
}
}

/* Hero */

.hero{
padding:50px 20px;
text-align:center;
}

.hero h1{
font-size:70px;
color:#00ffe1;
text-shadow:0 0 30px #00ffe1;
}

.hero p{
margin-top:20px;
font-size:22px;
color:#aaa;
}

/* Chat Box */

.chat-box{
max-width:700px;
margin:40px auto;
background:#111;
padding:30px;
border-radius:25px;
box-shadow:0 0 30px #00ffe166;
}

.chat-box h2{
text-align:center;
font-size:55px;
margin-bottom:25px;
}

.chat-box input{
width:100%;
padding:18px;
border:none;
outline:none;
border-radius:15px;
background:black;
color:white;
font-size:20px;
}

.buttons{
display:flex;
gap:20px;
margin-top:25px;
flex-wrap:wrap;
}

.buttons button{
flex:1;
padding:18px;
border:none;
border-radius:50px;
background:#00ffe1;
font-size:22px;
cursor:pointer;
box-shadow:0 0 25px #00ffe1;
}

#response{
margin-top:30px;
font-size:24px;
line-height:1.7;
color:#00ffe1;
min-height:120px;
}

/* Footer */

footer{
margin-top:40px;
padding:20px;
text-align:center;
background:#111;
color:#aaa;
}

/* Mobile */

@media(max-width:700px){

.hero h1{
font-size:50px;
}

.hero p{
font-size:18px;
}

.chat-box h2{
font-size:40px;
}

.buttons{
flex-direction:column;
}

}

</style>
</head>

<body>

<section class="hero">

<h1>🚀 Darkverse AI</h1>

<p>
Future AI Chatbot Powered By OpenRouter
</p>

</section>

<div class="chat-box">

<h2>🤖 AI Chat</h2>

<input
type="text"
id="input"
placeholder="Ask anything..."
>

<div class="buttons">

<button onclick="sendMessage()">
Send
</button>

<button onclick="startVoice()">
🎤 Speak
</button>

</div>

<div id="response">
Welcome to Darkverse AI 🚀
</div>

</div>

<footer>
© 2026 Darkverse AI
</footer>

<script>

/* SEND MESSAGE */

function sendMessage(){

const input =
document.getElementById("input").value;

const response =
document.getElementById("response");

if(input.trim() === ""){

response.innerHTML =
"⚠️ Please type something";

return;

}

/* Fake AI Reply */

const reply =
"🤖 Darkverse AI says: " + input;

response.innerHTML = reply;

/* Voice Output */

const speech =
new SpeechSynthesisUtterance(reply);

speech.lang = "en-US";

window.speechSynthesis.speak(speech);

}

/* Voice Input */

function startVoice(){

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

alert("Voice not supported");

return;

}

const recognition =
new SpeechRecognition();

recognition.lang = "en-US";

recognition.start();

recognition.onresult = function(event){

const text =
event.results[0][0].transcript;

document.getElementById("input").value =
text;

sendMessage();

};

}

</script>


</body>
</html>
