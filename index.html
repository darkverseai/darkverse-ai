<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Darkverse AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(#00ffe7 1px, transparent 1px);
background-size:40px 40px;
opacity:0.15;
z-index:-1;
}

.container{
width:95%;
max-width:520px;
height:95vh;
background:rgba(10,10,10,0.95);
border:2px solid #00ffe7;
border-radius:30px;
padding:20px;
display:flex;
flex-direction:column;
box-shadow:0 0 35px #00ffe7;
backdrop-filter:blur(10px);
}

.logo{
text-align:center;
font-size:40px;
font-weight:bold;
color:#00ffe7;
margin-bottom:20px;
text-shadow:0 0 20px #00ffe7;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:15px;
scroll-behavior:smooth;
}

.chat-box::-webkit-scrollbar{
width:4px;
}

.chat-box::-webkit-scrollbar-thumb{
background:#00ffe7;
border-radius:20px;
}

.user,
.bot{
max-width:80%;
padding:15px;
border-radius:20px;
font-size:18px;
line-height:1.5;
animation:fadeIn 0.3s ease;
word-wrap:break-word;
}

.user{
align-self:flex-end;
background:#00ffe7;
color:black;
border-bottom-right-radius:5px;
font-weight:bold;
}

.bot{
align-self:flex-start;
background:#161616;
color:#00ffe7;
border-bottom-left-radius:5px;
box-shadow:0 0 15px rgba(0,255,231,0.2);
}

.typing{
font-style:italic;
opacity:0.7;
}

.input-area{
display:flex;
flex-direction:column;
gap:12px;
margin-top:15px;
}

.input-row{
display:flex;
gap:10px;
}

input{
flex:1;
padding:16px;
border:none;
outline:none;
border-radius:18px;
background:#0d0d0d;
color:white;
font-size:18px;
box-shadow:0 0 15px rgba(0,255,231,0.2);
}

.send-btn,
.voice-btn{
padding:16px;
border:none;
border-radius:18px;
background:#00ffe7;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 20px #00ffe7;
}

.send-btn:hover,
.voice-btn:hover{
transform:scale(1.05);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
🚀 Darkverse AI
</div>

<div class="chat-box" id="chatBox">

<div class="bot">
🤖 Hello! Welcome to Darkverse AI 🚀
</div>

</div>

<div class="input-area">

<div class="input-row">

<input
type="text"
id="userInput"
placeholder="Ask Darkverse AI..."
>

<button
class="send-btn"
onclick="sendMessage()">
Send
</button>

</div>

<button
class="voice-btn"
onclick="startVoice()">
🎤 Voice Input
</button>

</div>

</div>

<script>

const input = document.getElementById("userInput");
const chatBox = document.getElementById("chatBox");

input.addEventListener("keypress", function(e){

if(e.key === "Enter"){
sendMessage();
}

});

function addMessage(text, sender){

const msg = document.createElement("div");

msg.classList.add(sender);

chatBox.appendChild(msg);

if(sender === "bot"){

typeEffect(msg, "🤖 " + text);

}else{

msg.innerText = text;

}

chatBox.scrollTop = chatBox.scrollHeight;

}

function typeEffect(element, text){

let i = 0;

function typing(){

if(i < text.length){

element.innerHTML += text.charAt(i);

i++;

setTimeout(typing, 15);

}

chatBox.scrollTop = chatBox.scrollHeight;

}

typing();

}

async function sendMessage(){

const message = input.value.trim();

if(!message) return;

addMessage(message, "user");

input.value = "";

const typingMsg =
document.createElement("div");

typingMsg.classList.add("bot","typing");

typingMsg.innerText =
"🤖 Darkverse AI is typing...";

chatBox.appendChild(typingMsg);

chatBox.scrollTop =
chatBox.scrollHeight;

try{

const response = await fetch("/api/chat", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:message
})

});

const data = await response.json();

typingMsg.remove();

addMessage(
data.reply || "No response",
"bot"
);

}catch(error){

typingMsg.remove();

addMessage(
"Server Error ❌",
"bot"
);

}

}

function startVoice(){

const recognition =
new(window.SpeechRecognition ||
window.webkitSpeechRecognition)();

recognition.lang = "en-US";

recognition.start();

recognition.onresult = function(event){

const text =
event.results[0][0].transcript;

input.value = text;

sendMessage();

};

recognition.onerror = function(){

addMessage(
"Voice recognition failed ❌",
"bot"
);

};

}

</script>

</body>
</html>
