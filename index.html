<!DOCTYPE html>
<html>
<head>
  <title>Darkverse AI</title>

  <style>
    body{
      margin:0;
      padding:0;
      background:black;
      color:white;
      font-family:Arial;
      text-align:center;
      overflow:hidden;
    }

    .container{
      margin-top:150px;
    }

    h1{
      font-size:60px;
      color:#00ffcc;
      text-shadow:0 0 20px #00ffcc;
    }

    p{
      font-size:22px;
      color:#cccccc;
    }

    button{
      padding:15px 35px;
      font-size:20px;
      border:none;
      border-radius:30px;
      background:#00ffcc;
      color:black;
      cursor:pointer;
      transition:0.3s;
      margin-top:20px;
      box-shadow:0 0 20px #00ffcc;
    }

    button:hover{
      transform:scale(1.1);
      background:white;
    }

    .bg{
      position:absolute;
      width:100%;
      height:100%;
      background:radial-gradient(circle,#111 10%,black 70%);
      z-index:-1;
    }

    .circle{
      position:absolute;
      width:300px;
      height:300px;
      background:#00ffcc33;
      border-radius:50%;
      filter:blur(80px);
      animation:move 6s infinite alternate;
    }

    @keyframes move{
      from{
        transform:translate(-100px,-50px);
      }
      to{
        transform:translate(100px,50px);
      }
    }
  </style>
</head>

<body>

<div class="bg"></div>
<div class="circle"></div>

<div class="container">
  <h1>🚀 Darkverse AI</h1>

  <p>Future of Artificial Intelligence Starts Here</p>

  <button onclick="alert('Welcome to Darkverse AI 🚀')">
    Enter Now
  </button>
</div>

</body>
</html>
