<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Darkverse AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(#00ffe155 1px, transparent 1px);
background-size:40px 40px;
animation:bgmove 15s linear infinite;
z-index:-1;
}

@keyframes bgmove{
from{
transform:translateY(0);
}
to{
transform:translateY(-40px);
}
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#111;
position:sticky;
top:0;
}

.logo{
font-size:30px;
font-weight:bold;
color:#00ffe1;
text-shadow:0 0 20px #00ffe1;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav ul li{
cursor:pointer;
transition:0.3s;
}

nav ul li:hover{
color:#00ffe1;
}

/* HERO */

.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero h1{
font-size:80px;
color:#00ffe1;
text-shadow:0 0 30px #00ffe1;
animation:glow 2s infinite alternate;
}

@keyframes glow{

from{
text-shadow:0 0 10px #00ffe1;
}

to{
text-shadow:0 0 40px #00ffe1;
}

}

.hero p{
margin-top:20px;
font-size:22px;
color:#aaa;
}

/* CHAT */

.chat-section{
padding:80px 20px;
text-align:center;
}

.chat-box{
max-width:700px;
margin:auto;
background:#111;
padding:30px;
border-radius:20px;
box-shadow:0 0 30px #00ffe144;
}

.chat-box input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:10px;
background:black;
color:white;
font-size:18px;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
flex-wrap:wrap;
}

.buttons button{
padding:15px 35px;
border:none;
border-radius:40px;
background:#00ffe1;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #00ffe1;
transition:0.3s;
}

.buttons button:hover{
transform:scale(1.05);
}

#aiResponse{
margin-top:30px;
font-size:22px;
color:#00ffe1;
min-height:80px;
line-height:1.6;
}

/* FOOTER */

footer{
margin-top:60px;
background:#111;
padding:25px;
text-align:center;
color:#aaa;
}

/* MOBILE */

@media(max-width:700px){

.hero h1{
font-size:50px;
}

.hero p{
font-size:18px;
}

nav ul{
display:none;
}

.chat-box{
padding:20px;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">
🚀 Darkverse AI
</div>

<ul>
<li>Home</li>
<li>About</li>
<li>Services</li>
</ul>

</nav>

<section class="hero">

<h1>Darkverse AI</h1>

<p>
Future Of Artificial Intelligence
</p>

</section>

<section class="chat-section">

<h1 style="font-size:50px;">
🤖 AI Chat
</h1>

<div class="chat-box">

<input
type="text"
id="userInput"
placeholder="Ask anything..."
>

<div class="buttons">

<button onclick="replyAI()">
Send
</button>

<button onclick="startVoice()">
🎤 Speak
</button>

</div>

<div id="aiResponse">
Welcome to Darkverse AI 🚀
</div>

</div>

</section>

<footer>
© 2026 Darkverse AI — All Rights Reserved
</footer>

<script>

const API_KEY =
"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";

function speak(text){

const speech =
new SpeechSynthesisUtterance(text);

speech.lang = "en-US";

window.speechSynthesis.speak(speech);

}

async function replyAI(){

const input =
document.getElementById("userInput").value;

const response =
document.getElementById("aiResponse");

if(input.trim() === ""){

response.innerHTML =
"⚠️ Please type something";

return;

}

response.innerHTML =
"⏳ Thinking...";

try{

const res = await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{
method:"POST",

headers:{
"Authorization":"Bearer " + API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({

model:"openai/gpt-3.5-turbo",

messages:[
{
role:"user",
content:input
}
]

})

});

const data = await res.json();

const reply =
data.choices[0].message.content;

response.innerHTML =
"🤖 " + reply;

speak(reply);

}
catch(error){

response.innerHTML =
"❌ AI Error: " + error.message;

}

}

function startVoice(){

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

alert("Voice recognition not supported");

return;

}

const recognition =
new SpeechRecognition();

recognition.lang = "en-US";

recognition.start();

recognition.onresult = function(event){

const text =
event.results[0][0].transcript;

document.getElementById("userInput").value =
text;

replyAI();

};

}

</script>

</body>
</html>
