<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Darkverse AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* Animated background */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(#00ffe155 1px, transparent 1px);
background-size:40px 40px;
animation:bg 10s linear infinite;
z-index:-1;
}

@keyframes bg{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-40px);
}
}

/* Navbar */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#111;
}

.logo{
font-size:45px;
font-weight:bold;
color:#00ffe1;
text-shadow:0 0 25px #00ffe1;
}

/* Hero */

.hero{
height:35vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero h1{
font-size:75px;
color:#00ffe1;
text-shadow:0 0 40px #00ffe1;
}

.hero p{
margin-top:20px;
font-size:22px;
color:#aaa;
}

/* Chat */

.chat-section{
padding:40px 20px;
}

.chat-box{
max-width:750px;
margin:auto;
background:#111;
padding:30px;
border-radius:25px;
box-shadow:0 0 30px #00ffe166;
}

.chat-box h2{
text-align:center;
font-size:55px;
margin-bottom:30px;
}

.chat-box input{
width:100%;
padding:18px;
border:none;
outline:none;
border-radius:15px;
background:black;
color:white;
font-size:20px;
}

.buttons{
display:flex;
gap:20px;
margin-top:25px;
justify-content:center;
flex-wrap:wrap;
}

.buttons button{
padding:16px 35px;
border:none;
border-radius:50px;
font-size:20px;
cursor:pointer;
background:#00ffe1;
box-shadow:0 0 25px #00ffe1;
transition:0.3s;
}

.buttons button:hover{
transform:scale(1.05);
}

#aiResponse{
margin-top:35px;
font-size:24px;
line-height:1.7;
color:#00ffe1;
min-height:100px;
}

/* Footer */

footer{
margin-top:50px;
background:#111;
padding:25px;
text-align:center;
color:#aaa;
}

/* Mobile */

@media(max-width:700px){

.logo{
font-size:28px;
}

.hero h1{
font-size:50px;
}

.hero p{
font-size:18px;
}

.chat-box h2{
font-size:42px;
}

.buttons button{
width:100%;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">
🚀 Darkverse AI
</div>

</nav>

<section class="hero">

<h1>AI Of Future</h1>

<p>
Smart futuristic chatbot powered by AI
</p>

</section>

<section class="chat-section">

<div class="chat-box">

<h2>🤖 AI Chat</h2>

<input
type="text"
id="userInput"
placeholder="Ask anything..."
>

<div class="buttons">

<button onclick="replyAI()">
Send
</button>

<button onclick="startVoice()">
🎤 Speak
</button>

</div>

<div id="aiResponse">
Welcome to Darkverse AI 🚀
</div>

</div>

</section>

<footer>
© 2026 Darkverse AI — All Rights Reserved
</footer>

<script>

/* API KEY */

const API_KEY =
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

/* SPEAK FUNCTION */

function speak(text){

const speech =
new SpeechSynthesisUtterance(text);

speech.lang = "en-US";

window.speechSynthesis.speak(speech);

}

/* AI REPLY */

async function replyAI(){

const input =
document.getElementById("userInput").value;

const response =
document.getElementById("aiResponse");

if(input.trim() === ""){

response.innerHTML =
"⚠️ Please type something";

return;

}

response.innerHTML =
"⏳ Thinking...";

try{

const res = await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{
method:"POST",

headers:{
"Authorization":"Bearer " + API_KEY,
"HTTP-Referer":"https://darkverse-ai.vercel.app",
"X-Title":"Darkverse AI",
"Content-Type":"application/json"
},

body:JSON.stringify({

model:"openai/gpt-3.5-turbo",

messages:[
{
role:"user",
content:input
}
]

})

});

const data = await res.json();

console.log(data);

const reply =
data?.choices?.[0]?.message?.content ||
"⚠️ No AI response received";

response.innerHTML =
"🤖 " + reply;

speak(reply);

}
catch(error){

response.innerHTML =
"❌ Error: " + error.message;

}

}

/* VOICE INPUT */

function startVoice(){

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

alert("Voice recognition not supported");

return;

}

const recognition =
new SpeechRecognition();

recognition.lang = "en-US";

recognition.start();

recognition.onresult = function(event){

const text =
event.results[0][0].transcript;

document.getElementById("userInput").value =
text;

replyAI();

};

}

</script>

</body>
</html>
