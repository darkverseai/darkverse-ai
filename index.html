<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Darkverse AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#020202;
color:white;
}

/* animated background */

body::before{

content:"";

position:absolute;

width:200%;

height:200%;

background:
radial-gradient(circle,#00ffe722 1px,transparent 1px);

background-size:40px 40px;

animation:moveBg 15s linear infinite;

z-index:-2;

}

@keyframes moveBg{

0%{
transform:translate(0,0);
}

100%{
transform:translate(-40px,-40px);
}

}

/* glowing circle */

.glow{

position:absolute;

width:300px;

height:300px;

background:#00ffe733;

filter:blur(120px);

border-radius:50%;

z-index:-1;

animation:floatGlow 6s ease-in-out infinite;

}

@keyframes floatGlow{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-30px);
}

}

.container{

width:95%;

max-width:520px;

height:95vh;

background:rgba(10,10,10,0.85);

border:2px solid #00ffe7;

border-radius:30px;

padding:20px;

display:flex;

flex-direction:column;

backdrop-filter:blur(15px);

box-shadow:
0 0 20px #00ffe7,
0 0 60px #00ffe744;

}

/* logo */

.logo{

text-align:center;

font-size:38px;

font-weight:bold;

color:#00ffe7;

margin-bottom:20px;

text-shadow:
0 0 10px #00ffe7,
0 0 25px #00ffe7;

}

/* chat */

.chat-box{

flex:1;

overflow-y:auto;

display:flex;

flex-direction:column;

gap:15px;

padding-right:5px;

scroll-behavior:smooth;

}

.chat-box::-webkit-scrollbar{

width:4px;

}

.chat-box::-webkit-scrollbar-thumb{

background:#00ffe7;

border-radius:20px;

}

.user,
.bot{

padding:15px;

max-width:80%;

border-radius:20px;

font-size:18px;

line-height:1.5;

animation:fadeIn .3s ease;

word-wrap:break-word;

}

.user{

align-self:flex-end;

background:#00ffe7;

color:black;

font-weight:bold;

border-bottom-right-radius:5px;

}

.bot{

align-self:flex-start;

background:#161616;

color:#00ffe7;

border-bottom-left-radius:5px;

box-shadow:0 0 15px #00ffe733;

}

.typing{

opacity:.7;

font-style:italic;

}

/* input area */

.input-area{

margin-top:15px;

display:flex;

flex-direction:column;

gap:12px;

}

.input-row{

display:flex;

gap:10px;

width:100%;

}

.input-row input{

flex:1;

min-width:0;

}

.input-row button{

width:110px;

flex-shrink:0;

}

input{

flex:1;

padding:16px;

border:none;

outline:none;

border-radius:18px;

background:#0d0d0d;

color:white;

font-size:18px;

box-shadow:0 0 15px #00ffe722;

}

button{

padding:16px;

border:none;

border-radius:18px;

background:#00ffe7;

color:black;

font-size:17px;

font-weight:bold;

cursor:pointer;

transition:.3s;

box-shadow:0 0 20px #00ffe7;

}

button:hover{

transform:scale(1.05);

}

.button-row{

display:flex;

gap:10px;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(10px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="glow"></div>

<div class="container">

<div class="logo">
🚀 Darkverse AI
</div>

<div
class="chat-box"
id="chatBox">

<div class="bot">
🤖 Welcome to Darkverse AI 🚀
</div>

</div>

<div class="input-area">

<div class="input-row">

<input
type="text"
id="userInput"
placeholder="Ask anything..."
>

<button
onclick="sendMessage()">
Send
</button>

</div>

<div class="button-row">

<button
onclick="startVoice()">
🎤 Voice
</button>

<button
onclick="clearChat()">
🗑 Clear
</button>

</div>

</div>

</div>

<script>

const input =
document.getElementById(
"userInput"
);

const chatBox =
document.getElementById(
"chatBox"
);

/* enter key */

input.addEventListener(
"keypress",
function(e){

if(e.key==="Enter"){

sendMessage();

}

}
);

/* add message */

function addMessage(
text,
sender
){

const msg =
document.createElement("div");

msg.classList.add(sender);

chatBox.appendChild(msg);

if(sender==="bot"){

typeEffect(
msg,
"🤖 " + text
);

}else{

msg.innerText = text;

}

chatBox.scrollTop =
chatBox.scrollHeight;

}

/* typing effect */

function typeEffect(
element,
text
){

let i = 0;

function typing(){

if(i < text.length){

element.innerHTML +=
text.charAt(i);

i++;

setTimeout(
typing,
15
);

}

chatBox.scrollTop =
chatBox.scrollHeight;

}

typing();

}

/* ai voice */

function speakText(text){

const speech =
new SpeechSynthesisUtterance();

speech.text = text;

speech.lang = "en-US";

speech.rate = 1;

window.speechSynthesis
.speak(speech);

}

/* send message */

async function sendMessage(){

const message =
input.value.trim();

if(!message) return;

addMessage(
message,
"user"
);

input.value = "";

const typingMsg =
document.createElement("div");

typingMsg.classList.add(
"bot",
"typing"
);

typingMsg.innerText =
"🤖 Darkverse AI is typing...";

chatBox.appendChild(
typingMsg
);

chatBox.scrollTop =
chatBox.scrollHeight;

try{

const response =
await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({
message
})

});

const data =
await response.json();

typingMsg.remove();

addMessage(
data.reply ||
"No response",
"bot"
);

speakText(
data.reply
);

}catch(error){

typingMsg.remove();

addMessage(
"Server Error ❌",
"bot"
);

}

}

/* voice input */

function startVoice(){

const recognition =
new(
window.SpeechRecognition ||
window.webkitSpeechRecognition
)();

recognition.lang =
"en-US";

recognition.start();

recognition.onresult =
function(event){

const text =
event.results[0][0]
.transcript;

input.value = text;

sendMessage();

};

recognition.onerror =
function(){

addMessage(
"Voice failed ❌",
"bot"
);

};

}

/* clear */

function clearChat(){

chatBox.innerHTML = `
<div class="bot">
🤖 Chat cleared 🚀
</div>
`;

}

</script>

</body>

</html>
